apiVersion: apps/v1
kind: Deployment
metadata:
  name: placeholder
spec:
  template:
    spec:
      containers:
        - name: cloudflared
          command:
            - cloudflared
            - tunnel
            - --no-autoupdate
            - --metrics
            - 0.0.0.0:2000
            - --protocol
            - http2
            - run
          livenessProbe:
            httpGet:
              path: /ready
              port: 2000
            failureThreshold: 5
            initialDelaySeconds: 30
            periodSeconds: 10
